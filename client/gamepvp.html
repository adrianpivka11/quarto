<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="games2.css">
    <title>Quarto Game</title>
</head>
<body>
    <div class="page">
        <div class="container">
            <div class="topbar">
                <a class="back-link" href="./index.html">← Back to game menu</a>
                <div id="game-id-label" class="game-id-label">Game ID: loading...</div>
            </div>

            <h1>Quarto Game</h1>
            <div class="status" id="status-box">Loading game data...</div>

            <div class="game-shell">
                <aside class="sidebar">
                    <section class="panel">
                        <h2>Stones</h2>
                        <div id="container-stones" class="stones-container"></div>
                    </section>

                    <section class="panel">
                        <h2>Move</h2>
                        <div class="game-container">
                            <div class="slot-block">
                                <div id="player1dropzone" class="drop-slot drop-slot-red"></div>
                                <label>Stone for Player 1</label>
                            </div>
                            <div class="slot-block">
                                <div id="player2dropzone" class="drop-slot drop-slot-blue"></div>
                                <label>Stone for Player 2</label>
                            </div>
                        </div>
                    </section>
                </aside>

                <section class="board-zone">
                    <h2>Board</h2>
                    <div class="grid" id="board"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="gamepvp.js" type="module"></script>
</body>
</html>
