  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Drag and Drop - Stones</h1>

  <!-- Pôvodný priestor, kde sú kamene -->
  <div class="stones-area">
    <div class="stone" id="stone1" draggable="true">Stone 1</div>
    <div class="stone" id="stone2" draggable="true">Stone 2</div>
    <div class="stone" id="stone3" draggable="true">Stone 3</div>
  </div>

  <!-- Container, do ktorého budeme kamene presúvať -->
  <div class="container" id="target-container" >
    Drop stones here (id="target-container")
  </div>

  <script src="script.js"></script>
</body>
</html>
